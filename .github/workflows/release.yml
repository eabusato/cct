name: Release (Linux/macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: Linux
            runner: ubuntu-latest
          - os_name: macOS
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev sqlite3 libsqlite3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install pkg-config openssl@3 sqlite

      - name: Build release package (no tests)
        shell: bash
        run: |
          make release VERSION="${{ steps.version.outputs.version }}"

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp "cct-v${{ steps.version.outputs.version }}-"* artifacts/
          ls -lah artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os_name }}
          path: artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Show assets
        shell: bash
        run: ls -lah release-assets

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CCT ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
          fail_on_unmatched_files: true
